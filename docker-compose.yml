services:
  postgres:
    image: postgres:16-alpine
    container_name: enerdata-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-enerdata}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-enerdata}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enerdata-app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      EIA_API_KEY: ${EIA_API_KEY}
      EIA_BASE_URL: ${EIA_BASE_URL}
      EIA_TIMEOUT_MS: ${EIA_TIMEOUT_MS}
      STATIC_JWT_SECRET: ${STATIC_JWT_SECRET}
      THROTTLE_TTL: ${THROTTLE_TTL}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      SYNC_CRON_EXPRESSION: ${SYNC_CRON_EXPRESSION}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
